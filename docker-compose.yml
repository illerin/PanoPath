services:
  panopath:
    image: illerin/panopath:latest
    container_name: panopath
    ports:
      - "3098:3098"
    volumes:
      # All persistent data (tiles, saved projects, presets) in one volume
      - panopath_data:/app/tmp
    environment:
      - PORT=3098
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  panopath_data:
    driver: local