services:
  panopath:
    image: illerin/panopath:latest
    container_name: panopath
    ports:
      - "3098:3098"
    volumes:
      - panopath_tiles:/app/tmp/tiles
    environment:
      - PORT=3098
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  panopath_tiles:
    driver: local
