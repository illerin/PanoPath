services:
  panopath:
    build: .
    container_name: panopath
    ports:
      - "3098:3098"
    volumes:
      # Tile data persists between restarts — required for Load Project to work
      - panopath_tiles:/app/tmp/tiles
    environment:
      - PORT=3098
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3098/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  panopath_tiles:
    driver: local
